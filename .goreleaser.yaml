project_name: jctl

before:
  hooks:
    - go mod tidy
    - go test ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    main: ./cmd/jctl
    binary: jctl

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: 'checksums.txt'

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'

# Homebrew tap configuration
brews:
  - name: jctl
    repository:
      owner: robyt96
      name: homebrew-tap
    homepage: https://github.com/robyt96/jctl
    description: "Jenkins Control Tool - CLI for Jenkins"
    license: MIT
    install: |
      bin.install "jctl"
    test: |
      system "#{bin}/jctl", "--version"